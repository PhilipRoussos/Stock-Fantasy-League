name: stockfantasyleague
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8
  audioplayers: ^6.5.1
  google_generative_ai: ^0.4.7
  url_launcher: ^6.3.0
  image_picker: ^1.0.7
  http: ^1.6.0
  firebase_auth: ^6.1.3
  cloud_firestore: 
  firebase_core:
  nearby_connections: ^4.3.0
  permission_handler: ^12.0.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.4
  vibration: ^3.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/Logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/Logo.png
    - assets/sounds/
